<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Rawaj Widget — iframe Test</title>
  <style>body { font-family: sans-serif; padding: 2rem; } #output { white-space: pre-wrap; background: #f5f5f5; padding: 1rem; margin-top: 1rem; }</style>
</head>
<body>
  <h1>iframe Embed Test</h1>
  <button id="prefill-btn">Send Prefill Data</button>
  <!-- Replace pk_test_REPLACE_ME with an actual test key -->
  <iframe id="widget" src="http://localhost:3000/widget?key=pk_test_REPLACE_ME&lang=ar&api_url=http://localhost:8000" width="100%" height="600" frameborder="0"></iframe>
  <h2>Messages from widget:</h2>
  <div id="output"></div>
  <script>
    const iframe = document.getElementById('widget');
    const output = document.getElementById('output');
    window.addEventListener('message', (e) => {
      if (e.data?.type?.startsWith('RAWAJ_')) {
        output.textContent += JSON.stringify(e.data, null, 2) + '\n\n';
      }
    });
    document.getElementById('prefill-btn').addEventListener('click', () => {
      iframe.contentWindow.postMessage({
        type: 'RAWAJ_PREFILL',
        payload: { product_name: 'فستان سهرة أنيق', category: 'fashion', tone: 'luxury', language: 'ar' }
      }, '*');
    });
  </script>
</body>
</html>
